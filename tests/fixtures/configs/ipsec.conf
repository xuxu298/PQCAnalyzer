# strongSwan IPSec configuration

conn %default
    keyexchange=ikev2
    ike=aes256-sha256-modp2048!
    esp=aes256-sha256!

conn office-to-dc
    left=%any
    leftsubnet=10.0.0.0/24
    right=203.113.1.1
    rightsubnet=172.16.0.0/16
    ike=aes128-sha1-modp1024,3des-md5-modp768!
    esp=aes128-sha1,3des-md5!
    auto=start

conn legacy-vpn
    keyexchange=ikev1
    left=%any
    right=10.1.1.1
    ike=des-md5-modp768!
    esp=des-md5!
    auto=add
