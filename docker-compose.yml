# Docker Compose for VN-PQC Readiness Analyzer
#
# Usage:
#   docker compose up              # API only (default)
#   docker compose --profile web up  # API + Web frontend
#
# Government/enterprise deployments can run API-only mode
# and provide their own customized frontend.

services:
  api:
    build:
      context: .
      target: base
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
    environment:
      - PQC_LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      target: web
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - web
    restart: unless-stopped
